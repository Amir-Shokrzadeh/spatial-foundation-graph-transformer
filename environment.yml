name: sfgt
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ── Python ──────────────────────────────────────────────────────────────
  - python=3.10

  # ── Core scientific stack ────────────────────────────────────────────────
  - numpy>=1.24,<2.0
  - pandas>=2.0
  - scipy>=1.11
  - scikit-learn>=1.3

  # ── PyTorch (CPU build; swap for cudatoolkit=11.8 on GPU) ───────────────
  - pytorch>=2.1
  - torchvision>=0.16
  - cpuonly                   # remove this line and add cudatoolkit on GPU

  # ── Jupyter ─────────────────────────────────────────────────────────────
  - jupyterlab>=4.0
  - ipywidgets>=8.0
  - tqdm>=4.65

  # ── Visualisation ───────────────────────────────────────────────────────
  - matplotlib>=3.7
  - seaborn>=0.13

  # ── pip-only packages ────────────────────────────────────────────────────
  - pip
  - pip:
      # Spatial / single-cell
      - scanpy>=1.9
      - squidpy>=1.3
      - anndata>=0.10

      # Graph neural networks
      # torch-geometric requires torch to be installed first;
      # pin to a compatible wheel set.
      - torch-geometric>=2.4
      - torch-scatter>=2.1.2
      - torch-sparse>=0.6.18
      - torch-cluster>=1.6.3

      # Foundation-model helpers (optional; comment out if not used)
      - transformers>=4.38
      - timm>=0.9

      # Config / utilities
      - pyyaml>=6.0
      - python-dotenv>=1.0
      - rich>=13.0          # pretty console output
      - networkx>=3.1
      - umap-learn>=0.5.5
      - leidenalg>=0.10
      - python-igraph>=0.11

      # Metrics / evaluation
      - adjustedrand>=0.0.2

      # Dev / reproducibility
      - black>=24.0
      - isort>=5.13
      - mypy>=1.8
